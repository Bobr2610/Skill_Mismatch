<!-- Shared header for profile/dashboard pages with top nav -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 lg:px-40 py-3 bg-background-light dark:bg-background-dark">
  <div class="flex items-center gap-8">
    <a href="dashboard.html" class="flex items-center gap-4 text-primary">
      <div class="size-6 flex items-center justify-center">
        <span class="material-symbols-outlined">analytics</span>
      </div>
      <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">DevMetrics</h2>
    </a>
    <label class="hidden md:flex flex-col min-w-40 h-10 max-w-64">
      <div class="flex w-full flex-1 items-stretch rounded-lg h-full">
        <div class="text-slate-500 dark:text-slate-400 flex border-none bg-slate-100 dark:bg-slate-800 items-center justify-center pl-4 rounded-l-lg">
          <span class="material-symbols-outlined text-[20px]">search</span>
        </div>
        <input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-0 border-none bg-slate-100 dark:bg-slate-800 h-full placeholder:text-slate-500 px-4 rounded-l-none pl-2 text-sm font-normal" placeholder="Search developer..." />
      </div>
    </label>
  </div>
  <div class="flex flex-1 justify-end gap-6 items-center">
    <nav class="hidden xl:flex items-center gap-8">
      <a class="text-slate-600 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="dashboard.html">Dashboard</a>
      <a class="text-primary text-sm font-semibold underline underline-offset-8" href="#">Teams</a>
      <a class="text-slate-600 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="#">Projects</a>
      <a class="text-slate-600 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="#">Analytics</a>
    </nav>
    <div class="flex gap-2">
      <button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700">
        <span class="material-symbols-outlined text-[20px]">notifications</span>
      </button>
      <button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700">
        <span class="material-symbols-outlined text-[20px]">settings</span>
      </button>
    </div>
    <div class="bg-primary/20 rounded-full border border-primary/30 p-0.5">
      <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-8" style="background-image: url('https://ui-avatars.com/api/?name=Admin&background=135bec&color=fff')"></div>
    </div>
  </div>
</header>
